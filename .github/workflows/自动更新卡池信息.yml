name: Gacha Smart Discovery Sync

on:
  schedule:
    - cron: '1 4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  discovery_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 基于现有数据向后探测（分别处理 special 和 weponbox）
        id: detector
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const filePath = path.join(process.env.GITHUB_WORKSPACE, 'src/data/gacha_map.json');
            let gachaMap = fs.existsSync(filePath) ? JSON.parse(fs.readFileSync(filePath, 'utf-8')) : {};

            // 分别找出 special 和 weponbox 的最大 (A, B, C)
            let maxSpecial = { a: 1, b: 0, c: 1 };
            let maxWepon = { a: 1, b: 0, c: 1 };

            Object.keys(gachaMap).forEach(id => {
              const parts = id.split('_');
              if (parts.length < 4) return;
              const type = parts[0];
              const a = parseInt(parts[1]);
              const b = parseInt(parts[2]);
              const c = parseInt(parts[3]);
              
              if (type === 'special') {
                if (a > maxSpecial.a || (a === maxSpecial.a && b > maxSpecial.b) || (a === maxSpecial.a && b === maxSpecial.b && c > maxSpecial.c)) {
                  maxSpecial = { a, b, c };
                }
              } else if (type === 'weponbox') {
                if (a > maxWepon.a || (a === maxWepon.a && b > maxWepon.b) || (a === maxWepon.a && b === maxWepon.b && c > maxWepon.c)) {
                  maxWepon = { a, b, c };
                }
              }
            });

            console.log(`📌 当前 special 最新锚点: A=${maxSpecial.a}, B=${maxSpecial.b}, C=${maxSpecial.c}`);
            console.log(`📌 当前 weponbox 最新锚点: A=${maxWepon.a}, B=${maxWepon.b}, C=${maxWepon.c}`);

            // 生成候选列表的函数（基于给定的最大锚点）
            function generateCandidates(maxA, maxB, maxC) {
              return [
                { a: maxA, b: maxB, c: maxC },          // 刷新当前池
                { a: maxA, b: maxB, c: maxC + 1 },      // 同版本下一池
                { a: maxA, b: maxB, c: maxC + 2 },      // 同版本下两池
                { a: maxA, b: maxB + 1, c: 1 },         // 下一个小版本首池
                { a: maxA, b: maxB + 1, c: 2 },         // 下一个小版本第二池
                { a: maxA + 1, b: 0, c: 1 }             // 下一个大版本首池
              ];
            }

            // 分别生成 special 和 weponbox 的候选，合并去重
            const specialCandidates = generateCandidates(maxSpecial.a, maxSpecial.b, maxSpecial.c);
            const weponCandidates = generateCandidates(maxWepon.a, maxWepon.b, maxWepon.c);
            const allCandidates = [...specialCandidates, ...weponCandidates];
            
            const uniqueCandidates = Array.from(new Set(allCandidates.map(p => `${p.a}_${p.b}_${p.c}`)))
                                           .map(s => {
                                             const [a, b, c] = s.split('_');
                                             return { a: parseInt(a), b: parseInt(b), c: parseInt(c) };
                                           });

            let newFetchedIds = [];

            async function fetchPool(type, a, b, c) {
              const poolId = `${type}_${a}_${b}_${c}`;
              const url = `https://ef-webview.hypergryph.com/api/content?lang=zh-cn&pool_id=${poolId}&server_id=1`;
              try {
                const res = await fetch(url);
                const json = await res.json();
                if (json.code === 0 && json.data?.pool) {
                  const isNew = !gachaMap[poolId];
                  if (isNew) {
                    newFetchedIds.push(poolId);
                    console.log(`🎯 新发现: ${poolId}`);
                  } else {
                    console.log(`🔄 更新已有数据: ${poolId}`);
                  }
                  gachaMap[poolId] = json.data.pool;
                  return true;
                } else {
                  console.log(`❌ 无效接口: ${poolId}`);
                }
              } catch (e) {
                console.log(`⚠️ 请求失败: ${poolId}`);
              }
              return false;
            }

            // 遍历所有去重后的候选三元组，分别请求 special 和 weponbox
            for (const cand of uniqueCandidates) {
              console.log(`🔍 探测候选: A=${cand.a}, B=${cand.b}, C=${cand.c}`);
              await fetchPool('special', cand.a, cand.b, cand.c);
              await fetchPool('weponbox', cand.a, cand.b, cand.c);
            }

            // 保存更新后的文件
            fs.writeFileSync(filePath, JSON.stringify(gachaMap, null, 2));

            // 输出新抓到的 ID
            core.setOutput('ids', newFetchedIds.join(', '));

      - name: 提交更新到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/gacha_map.json

          FETCHED_IDS="${{ steps.detector.outputs.ids }}"

          if git diff --staged --quiet; then
            echo "没有新内容需要提交"
          else
            if [ -z "$FETCHED_IDS" ]; then
              COMMIT_MSG="auto: 定时同步卡池数据 (数据更新)"
            else
              COMMIT_MSG="auto: 添加新卡池数据 [ $FETCHED_IDS ]"
            fi

            git commit -m "$COMMIT_MSG"
            git push
          fi
