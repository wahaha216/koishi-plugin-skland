name: Gacha Smart Discovery Sync

on:
  schedule:
    - cron: '1 4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  discovery_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 基于现有数据向后探测（支持 A 变化，并更新已有池子）
        id: detector
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const filePath = path.join(process.env.GITHUB_WORKSPACE, 'src/data/gacha_map.json');
            let gachaMap = fs.existsSync(filePath) ? JSON.parse(fs.readFileSync(filePath, 'utf-8')) : {};

            // 1. 从现有 special_ 和 weponbox_ 中找出最大的 (A, B, C)
            let maxA = 1, maxB = 0, maxC = 1;
            Object.keys(gachaMap).forEach(id => {
              if (!id.startsWith('special_') && !id.startsWith('weponbox_')) return;
              const parts = id.split('_');
              if (parts.length >= 4) {
                const a = parseInt(parts[1]);
                const b = parseInt(parts[2]);
                const c = parseInt(parts[3]);
                if (a > maxA) {
                  maxA = a; maxB = b; maxC = c;
                } else if (a === maxA) {
                  if (b > maxB) {
                    maxB = b; maxC = c;
                  } else if (b === maxB && c > maxC) {
                    maxC = c;
                  }
                }
              }
            });
            console.log(`📌 当前最新卡池锚点: A=${maxA}, B=${maxB}, C=${maxC}`);

            // 2. 构建候选探测计划（包含刷新当前池 + 后续可能的新池）
            const candidates = [
              { a: maxA, b: maxB, c: maxC },          // 刷新当前池（官方可能补全数据）
              { a: maxA, b: maxB, c: maxC + 1 },      // 同版本下一池
              { a: maxA, b: maxB, c: maxC + 2 },      // 同版本下两池
              { a: maxA, b: maxB + 1, c: 1 },         // 下一个小版本首池
              { a: maxA, b: maxB + 1, c: 2 },         // 下一个小版本第二池
              { a: maxA + 1, b: 0, c: 1 }             // 下一个大版本首池
            ];

            // 去重（避免重复，比如 C 和 C+1 等）
            const uniqueCandidates = Array.from(new Set(candidates.map(p => `${p.a}_${p.b}_${p.c}`)))
                                           .map(s => {
                                             const [a, b, c] = s.split('_');
                                             return { a: parseInt(a), b: parseInt(b), c: parseInt(c) };
                                           });

            let newFetchedIds = [];

            async function fetchPool(type, a, b, c) {
              const poolId = `${type}_${a}_${b}_${c}`;
              const url = `https://ef-webview.hypergryph.com/api/content?lang=zh-cn&pool_id=${poolId}&server_id=1`;
              try {
                const res = await fetch(url);
                const json = await res.json();
                if (json.code === 0 && json.data?.pool) {
                  const isNew = !gachaMap[poolId];
                  if (isNew) {
                    newFetchedIds.push(poolId);
                    console.log(`🎯 新发现: ${poolId}`);
                  } else {
                    console.log(`🔄 更新已有数据: ${poolId}`);
                  }
                  gachaMap[poolId] = json.data.pool;
                  return true;
                } else {
                  console.log(`❌ 无效接口: ${poolId}`);
                }
              } catch (e) {
                console.log(`⚠️ 请求失败: ${poolId}`);
              }
              return false;
            }

            // 3. 依次探测所有候选（刷新已有池 + 探测新池）
            for (const cand of uniqueCandidates) {
              console.log(`🔍 探测候选: A=${cand.a}, B=${cand.b}, C=${cand.c}`);
              await fetchPool('special', cand.a, cand.b, cand.c);
              await fetchPool('weponbox', cand.a, cand.b, cand.c);
            }

            // 4. 保存更新后的文件
            fs.writeFileSync(filePath, JSON.stringify(gachaMap, null, 2));

            // 5. 输出新抓到的 ID 给 commit 步骤
            core.setOutput('ids', newFetchedIds.join(', '));

      - name: 提交更新到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/gacha_map.json

          FETCHED_IDS="${{ steps.detector.outputs.ids }}"

          if git diff --staged --quiet; then
            echo "没有新内容需要提交"
          else
            if [ -z "$FETCHED_IDS" ]; then
              COMMIT_MSG="auto: 定时同步卡池数据 (数据更新)"
            else
              COMMIT_MSG="auto: 添加新卡池数据 [ $FETCHED_IDS ]"
            fi

            git commit -m "$COMMIT_MSG"
            git push
          fi
